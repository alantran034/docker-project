<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Docker Cloud Demo</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            opacity: 0.8;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #ff7a18;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ff5200;
            transform: scale(1.05);
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .loading {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>🚀 Docker Cloud System</h1>
    <p>Frontend - Backend - Database đang hoạt động</p>

    <button onclick="loadData()">Gọi API</button>

    <div id="loading" class="loading"></div>
    <div id="result"></div>
</div>

<script>
    function loadData() {
        const result = document.getElementById("result");
        const loading = document.getElementById("loading");

        loading.innerText = "⏳ Đang gọi API...";
        result.innerText = "";

        fetch("/api/data")
            .then(res => res.json())
            .then(data => {
                loading.innerText = "";
                result.innerText = "🕒 Server time: " + data.time;
            })
            .catch(err => {
                loading.innerText = "";
                result.innerText = "❌ Lỗi kết nối backend!";
            });
    }
</script>

</body>
</html>
